<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR IP 夥伴 — 展示模式（免鏡頭）</title>
<meta name="description" content="AR IP 夥伴的無鏡頭展示模式：直接在瀏覽器裡跟三隻 IP 角色互動，適合提案展示。">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐻</text></svg>">
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RDJD1YVHR7"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());gtag('config','G-RDJD1YVHR7');
</script>
<script src="vendor/aframe.min.js"></script>
<style>
:root { --brand-primary:#FF7FA5; --brand-dark:#4A3B47; --brand-bg:#FFF7FA; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft JhengHei','PingFang TC',sans-serif; overflow:hidden; }
#topbar { position:fixed; z-index:20; top:0; left:0; right:0; display:flex;
  justify-content:space-between; align-items:center; padding:10px 14px;
  background:linear-gradient(rgba(0,0,0,.35),transparent); color:#fff; }
#topbar h1 { font-size:16px; text-shadow:0 1px 4px rgba(0,0,0,.4); }
.pill { border:none; border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700;
  background:#fff; color:var(--brand-dark); box-shadow:0 2px 8px rgba(0,0,0,.2); cursor:pointer; }
#bubble { display:none; position:fixed; z-index:20; bottom:80px; left:50%;
  transform:translateX(-50%); width:calc(100% - 28px); max-width:520px;
  background:#fff; border-radius:18px; padding:12px 16px; box-shadow:0 4px 16px rgba(0,0,0,.25); }
#bubble .who { font-size:13px; font-weight:700; color:var(--brand-primary); }
#bubble .line { font-size:16px; color:var(--brand-dark); line-height:1.5; }
#bubble .meta { font-size:12px; color:#999; margin-top:6px; }
#tip { position:fixed; z-index:20; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.5); color:#fff; font-size:13px; padding:8px 16px; border-radius:999px; }
</style>
</head>
<body>
<div id="topbar">
  <h1>🎬 展示模式（免鏡頭）</h1>
  <a class="pill" href="index.html">📷 回 AR 掃描</a>
</div>
<div id="bubble" role="status" aria-live="polite"><div class="who"></div><div class="line"></div><div class="meta"></div></div>
<div id="tip">👆 點角色跟牠互動（此模式不需要相機）</div>

<a-scene vr-mode-ui="enabled: false" background="color: #FFE9F0">
  <a-entity light="type: ambient; intensity: 0.9"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>
  <a-plane rotation="-90 0 0" width="20" height="20" color="#FFD6E2" position="0 -0.01 0"></a-plane>
  <a-camera position="0 1 2.2" look-controls="enabled: true"
            cursor="fuse: false; rayOrigin: mouse"
            raycaster="far: 10000; objects: .clickable"></a-camera>
  <a-entity id="stage"></a-entity>
</a-scene>

<script src="characters.js"></script>
<script>
const stage = document.getElementById('stage');
const bubble = document.getElementById('bubble');
let bubbleTimer = null;

(async function () {
  await arpLoadConfig();
  const POS = ['-0.9 0 0', '0 0 0', '0.9 0 0'];
  CHARACTERS.forEach((ch, i) => {
    const wrap = document.createElement('a-entity');
    wrap.setAttribute('position', POS[i] || (i + ' 0 0'));
    const c = buildCharacter(ch);
    wrap.appendChild(c);
    stage.appendChild(wrap);
    arpDiscover(ch.id); // 展示模式直接全解鎖
    applyAccessories(ch);
    c.addEventListener('click', () => {
      const aff = arpAffection(ch.id, 1);
      charJump(ch.id);
      arpSfx('pop'); arpVibrate(40);
      showBubble(ch.name, pickLine(ch.taps), '💗 好感度 ' + aff + '（Lv.' + arpLevel(aff) + '）');
      arpSpeak(ch, bubble.querySelector('.line').textContent);
      arpTrack('demo_character_tap', { character: ch.id });
    });
  });
})();

function showBubble(who, line, meta) {
  bubble.querySelector('.who').textContent = who;
  bubble.querySelector('.line').textContent = line;
  bubble.querySelector('.meta').textContent = meta || '';
  bubble.style.display = 'block';
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => bubble.style.display = 'none', 4000);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>示範圖 — AR IP 夥伴</title>
<meta name="description" content="AR IP 夥伴的三張示範辨識圖：在這台裝置顯示，用另一台手機掃描就能喚醒對應角色。">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-RDJD1YVHR7"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());gtag('config','G-RDJD1YVHR7');
</script>
<style>
:root { --brand-primary:#FF7FA5; --brand-dark:#4A3B47; --brand-bg:#FFF7FA; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft JhengHei','PingFang TC',sans-serif; background:var(--brand-bg);
  color:var(--brand-dark); min-height:100vh; }
header { padding:18px 16px 6px; text-align:center; }
header h1 { font-size:20px; }
header p { font-size:13px; color:#987f8f; margin-top:6px; line-height:1.7; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px;
  padding:16px; max-width:860px; margin:0 auto; }
.cardx { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.08);
  cursor:pointer; border:none; text-align:center; padding:0 0 12px; }
.cardx img { width:100%; aspect-ratio:3/4; object-fit:cover; display:block; }
.cardx b { display:block; font-size:15px; margin-top:10px; color:var(--brand-dark); }
.cardx span { font-size:12px; color:#987f8f; }
#viewer { display:none; position:fixed; inset:0; z-index:50; background:#fff;
  flex-direction:column; align-items:center; justify-content:center; }
#viewer img { max-width:96vw; max-height:82vh; object-fit:contain; }
#viewer p { font-size:14px; color:#987f8f; margin-top:10px; }
#viewer button { margin-top:10px; border:none; border-radius:999px; padding:10px 22px;
  font-size:15px; font-weight:700; background:var(--brand-primary); color:#fff; cursor:pointer; min-height:44px; }
footer { text-align:center; padding:20px; font-size:13px; }
footer a { color:var(--brand-primary); }
</style>
</head>
<body>
<header>
  <h1>🃏 示範辨識圖</h1>
  <p>點一張卡放大 → 用<b>另一台手機</b>開 <b>ar-ip-pets.zeabur.app</b> 掃它，<br>對應的角色就會出現。也可以把圖片印出來掃。</p>
</header>
<div class="grid" id="grid"></div>
<div id="viewer" role="dialog" aria-label="示範圖放大顯示">
  <img id="viewer-img" src="" alt="示範辨識圖">
  <p id="viewer-cap"></p>
  <button id="viewer-close">關閉，換一張</button>
</div>
<footer><a href="index.html">📷 回 AR 掃描</a>｜<a href="demo.html">🎬 免鏡頭展示</a></footer>
<script src="cloud.js"></script>
<script src="characters.js"></script>
<script>
const DEMO_IMGS = ['assets/demo-1.png', 'assets/demo-2.png', 'assets/demo-3.png'];
const SPECIES_EMOJI = { bunny:'🐰', bear:'🐻', chick:'🐤', image:'🌟' };
(async function () {
  await arpLoadConfig();
  const grid = document.getElementById('grid');
  CHARACTERS.forEach((ch, i) => {
    const img = DEMO_IMGS[ch.targetIndex] || DEMO_IMGS[i];
    if (!img) return;
    const b = document.createElement('button');
    b.className = 'cardx';
    b.innerHTML = '<img src="' + img + '" alt="' + ch.product + '" loading="lazy">' +
      '<b>' + (SPECIES_EMOJI[ch.species] || '🌟') + ' 喚醒：' + ch.name + '</b>' +
      '<span>' + ch.product + '</span>';
    b.addEventListener('click', () => {
      document.getElementById('viewer-img').src = img;
      document.getElementById('viewer-cap').textContent = '用另一台手機掃這張 → ' + ch.name + ' 就會出現';
      document.getElementById('viewer').style.display = 'flex';
      try { if (window.gtag) gtag('event', 'demo_target_view', { character: ch.id }); } catch (e) {}
    });
    grid.appendChild(b);
  });
  document.getElementById('viewer-close').addEventListener('click', () =>
    document.getElementById('viewer').style.display = 'none');
})();
</script>
</body>
</html>

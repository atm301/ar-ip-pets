<style>
:root { --brand-primary:#FF7FA5; --brand-dark:#4A3B47; --brand-bg:#FFF7FA; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft JhengHei','PingFang TC',sans-serif; overflow:hidden; background:#000; }
.hud { position:fixed; z-index:20; }
#topbar { top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; padding-top:calc(10px + env(safe-area-inset-top));
  background:linear-gradient(rgba(0,0,0,.45),transparent); color:#fff; }
#topbar h1 { font-size:16px; font-weight:700; text-shadow:0 1px 4px rgba(0,0,0,.5); }
.pill { border:none; border-radius:999px; padding:8px 14px; font-size:14px; font-weight:700;
  background:#fff; color:var(--brand-dark); box-shadow:0 2px 8px rgba(0,0,0,.25); cursor:pointer;
  min-height:44px; }
.pill.primary { background:var(--brand-primary); color:#fff; }
#bottombar { bottom:0; left:0; right:0; padding:12px 14px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
  display:flex; flex-direction:column; gap:10px; align-items:center; pointer-events:none; }
#bottombar > * { pointer-events:auto; }
#bubble { display:none; max-width:520px; width:100%; background:#fff; border-radius:18px;
  padding:12px 16px; box-shadow:0 4px 16px rgba(0,0,0,.3); }
#bubble .who { font-size:13px; font-weight:700; color:var(--brand-primary); margin-bottom:2px; }
#bubble .line { font-size:16px; color:var(--brand-dark); line-height:1.5; }
#bubble .meta { font-size:12px; color:#999; margin-top:6px; }
#bubble .cta { display:none; margin-top:8px; }
#bubble .cta a { display:inline-block; background:var(--brand-primary); color:#fff;
  text-decoration:none; font-size:14px; font-weight:700; border-radius:999px; padding:8px 16px; }
#actions { display:none; gap:10px; }
#hint { display:none; background:rgba(0,0,0,.55); color:#fff; font-size:14px;
  border-radius:12px; padding:10px 16px; text-align:center; line-height:1.6; }
#hint a { color:#fff; }
/* 1-3 掃描框（四角括號 + 呼吸動畫） */
#scanbox { display:none; position:fixed; z-index:15; top:50%; left:50%;
  width:min(72vw, 340px); height:min(72vw, 340px); transform:translate(-50%,-55%); pointer-events:none; }
#scanbox i { position:absolute; width:36px; height:36px; border:4px solid #fff; opacity:.9; }
#scanbox i:nth-child(1) { top:0; left:0; border-right:none; border-bottom:none; border-radius:10px 0 0 0; }
#scanbox i:nth-child(2) { top:0; right:0; border-left:none; border-bottom:none; border-radius:0 10px 0 0; }
#scanbox i:nth-child(3) { bottom:0; left:0; border-right:none; border-top:none; border-radius:0 0 0 10px; }
#scanbox i:nth-child(4) { bottom:0; right:0; border-left:none; border-top:none; border-radius:0 0 10px 0; }
#scanbox .beam { position:absolute; left:8%; width:84%; height:3px; border:none;
  background:linear-gradient(90deg,transparent,var(--brand-primary),transparent);
  animation:beam 2s ease-in-out infinite; border-radius:3px; }
@keyframes beam { 0%,100% { top:12%; } 50% { top:85%; } }
@media (prefers-reduced-motion: reduce) { #scanbox .beam { animation:none; top:50%; } }
.modal { display:none; position:fixed; inset:0; z-index:40; background:rgba(0,0,0,.65);
  align-items:center; justify-content:center; padding:20px; }
.modal .card { background:var(--brand-bg); border-radius:20px; width:100%; max-width:480px;
  max-height:80vh; overflow-y:auto; padding:20px; }
.modal h2 { color:var(--brand-dark); font-size:18px; margin-bottom:14px; }
.charrow { display:flex; align-items:center; gap:12px; background:#fff; border-radius:14px;
  padding:12px; margin-bottom:10px; }
.charrow .dot { width:44px; height:44px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:24px; overflow:hidden; }
.charrow .dot img { width:100%; height:100%; object-fit:contain; }
.charrow .info { flex:1; }
.charrow .info b { color:var(--brand-dark); font-size:15px; }
.charrow .info p { color:#888; font-size:12px; margin-top:2px; }
.charrow.locked { opacity:.45; filter:grayscale(1); }
.lvl { font-size:12px; color:var(--brand-primary); font-weight:700; }
.closebtn { width:100%; margin-top:6px; }
#duo-lines { display:flex; flex-direction:column; gap:8px; }
.duoline { background:#fff; border-radius:12px; padding:10px 14px; font-size:15px; color:var(--brand-dark); }
.duoline b { color:var(--brand-primary); margin-right:6px; }
#toast { display:none; position:fixed; top:70px; left:50%; transform:translateX(-50%);
  z-index:50; background:var(--brand-primary); color:#fff; font-weight:700;
  padding:10px 20px; border-radius:999px; box-shadow:0 4px 14px rgba(0,0,0,.3); font-size:15px;
  max-width:88vw; text-align:center; }
#custombar { display:none; position:fixed; z-index:21; top:58px; left:50%; transform:translateX(-50%);
  background:#4A3B47; color:#fff; font-size:12px; padding:6px 12px; border-radius:999px; }
#custombar button { background:none; border:none; color:#FFB6C1; font-size:12px; cursor:pointer; text-decoration:underline; }

<script>
const bubble = document.getElementById('bubble');
const hint = document.getElementById('hint');
const actions = document.getElementById('actions');
const toast = document.getElementById('toast');
const scanbox = document.getElementById('scanbox');
let activeIds = [];
let bubbleTimer = null, factTimer = null, idleTimer = null;
const greetTimers = {}, lastGreet = {};
let duoPlayed = false;
let sceneEl = null;

function showToast(msg) {
  toast.textContent = msg; toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2400);
}
function showBubble(who, line, meta, ctaUrl, chForVoice) {
  bubble.querySelector('.who').textContent = who;
  bubble.querySelector('.line').textContent = line;
  bubble.querySelector('.meta').textContent = meta || '';
  const cta = bubble.querySelector('.cta');
  if (ctaUrl) {
    const u = ctaUrl + (ctaUrl.includes('?') ? '&' : '?') + 'utm_source=ar-ip-pets&utm_medium=ar';
    document.getElementById('cta-link').href = u;
    cta.style.display = 'block';
  } else cta.style.display = 'none';
  bubble.style.display = 'block';
  if (chForVoice) arpSpeak(chForVoice, line);
  clearTimeout(bubbleTimer);
  const showMs = Math.max(ctaUrl ? 7000 : 4500, arpEstMs(line) + 900);
  bubbleTimer = setTimeout(() => bubble.style.display = 'none', showMs);
}
document.getElementById('cta-link').addEventListener('click', () => {
  arpTrack('outbound_click', { link_url: document.getElementById('cta-link').href });
});

/* 1-3 掃描狀態機：ready → scanning 提示；久掃不到 → 加強提示 */
function setScanning(on) {
  scanbox.style.display = on ? 'block' : 'none';
  clearTimeout(idleTimer);
  if (on) {
    hint.style.display = 'block';
    hint.innerHTML = '📷 把<b>產品圖</b>放進框框裡<br><a href="targets.html" target="_blank">沒有示範圖？點我開啟</a>';
    idleTimer = setTimeout(() => {
      if (activeIds.length === 0) {
        hint.innerHTML = '🤔 掃不到嗎？試試：<br>1️⃣ 距離 20～30 公分 2️⃣ 避免反光和昏暗<br>3️⃣ 圖要攤平、完整入鏡<br><a href="targets.html" target="_blank">開啟示範圖測試</a>';
        arpTrack('scan_struggle', {});
      }
    }, 12000);
  } else {
    hint.style.display = 'none';
  }
}

function onFound(ch) {
  if (!activeIds.includes(ch.id)) activeIds.push(ch.id);
  setScanning(false);
  actions.style.display = 'flex';
  arpBumpScan(arpSid(ch));
  questBump('scan'); updateQuestBadge();
  arpCloudLog('scan', arpSid(ch));
  arpSfx('found'); arpVibrate([30, 40, 60]);
  const rootEl = document.getElementById('char-' + ch.id);
  if (rootEl) {
    rootEl.removeAttribute('animation__spawn');
    rootEl.setAttribute('animation__spawn',
      'property: scale; from: 0.01 0.01 0.01; to: 1.1 1.1 1.1; dur: 550; easing: easeOutBack');
    setTimeout(() => rootEl.setAttribute('scale', '1.1 1.1 1.1'), 700);
  }
  /* 登場後打招呼動作（防抖：追蹤閃爍重觸發不連發，5 秒內只打一次招呼） */
  clearTimeout(greetTimers[ch.id]);
  greetTimers[ch.id] = setTimeout(() => {
    if (activeIds.includes(ch.id) && Date.now() - (lastGreet[ch.id] || 0) > 5000) {
      lastGreet[ch.id] = Date.now();
      charReact(ch.id, 'greet');
    }
  }, 750);
  const isNew = arpDiscover(arpSid(ch));
  if (isNew) {
    showToast('🎉 收集到新夥伴：' + ch.name + '！');
    arpTrack('character_discovered', { character: arpSid(ch) });
    arpCloudLog('character_discovered', arpSid(ch));
    const n = arpCollectedCount();
    if (n === 2) {
      arpTrack('collect_second', { character: ch.id }); /* 3-2 回購代理指標 */
      setTimeout(() => showToast('✨ 集滿 2 隻，隱藏劇情解鎖！'), 2600);
    }
    if (n === CHARACTERS.length) arpTrack('collect_all', {});
  }
  /* 打招呼講完 → 停 1.3 秒 → 才送產品小知識（不互相蓋台） */
  const greetLine = pickLine(ch.greet);
  showBubble(ch.name, greetLine, isNew ? '✨ 新夥伴加入圖鑑！' : '', '', null);
  clearTimeout(factTimer);
  arpSpeakSeq(ch, greetLine).then(() => {
    if (!ch.facts || !ch.facts.length) return;
    factTimer = setTimeout(() => {
      if (activeIds.includes(ch.id)) {
        showBubble(ch.name, pickLine(ch.facts), '💡 小知識', ch.productUrl || '', ch);
        arpTrack('product_fact_shown', { character: arpSid(ch) });
      }
    }, 1300);
  });
  updateBookBadge();
  if (activeIds.length >= 2 && !duoPlayed) {
    duoPlayed = true;
    setTimeout(() => playDuo(activeIds[0], activeIds[1]), 1500);
  }
}
function onLost(ch) {
  activeIds = activeIds.filter(id => id !== ch.id);
  if (activeIds.length === 0) {
    actions.style.display = 'none';
    setScanning(true);
    duoPlayed = false;
  }
}
function currentChar() {
  return activeIds.length ? charById(activeIds[activeIds.length - 1]) : null;
}
function talk(ch) {
  ch = ch || currentChar(); if (!ch) return;
  const aff = arpAffection(arpSid(ch), 1);
  charReact(ch.id, 'tap');
  arpSfx('pop'); arpVibrate(40);
  showBubble(ch.name, pickLine(ch.taps), '💗 好感度 ' + aff + '（Lv.' + arpLevel(aff) + '）', '', ch);
  arpTrack('character_tap', { character: ch.id, affection: aff });
  questBump('talk'); updateQuestBadge();
  /* 紙娃娃雛形：好感度 Lv.3 解鎖圍巾，角色外觀直接改變 */
  if (arpLevel(aff) >= 3 && arpUnlockItem('scarf')) {
    setTimeout(() => showToast('✨ 好感度 Lv.3！獲得配件「好感圍巾」'), 800);
    CHARACTERS.forEach(applyAccessories);
    arpTrack('item_unlock', { item: 'scarf' });
  }
}
function feed(ch) {
  ch = ch || currentChar(); if (!ch) return;
  arpFeed(arpSid(ch));
  charReact(ch.id, 'feed');
  arpSfx('yum'); arpVibrate([30, 30, 30]);
  const s = arpLoad().collected[arpSid(ch)];
  showBubble(ch.name, pickLine(ch.feeds), '🍡 已餵食 ' + s.fed + ' 次｜💗 好感度 ' + s.affection, '', ch);
  arpTrack('character_feed', { character: ch.id });
  questBump('feed'); updateQuestBadge();
  arpCloudLog('character_feed', ch.id);
}

/* ---- 每日任務 UI ---- */
function updateQuestBadge() {
  document.getElementById('quest-badge').style.display = questClaimable() > 0 ? 'inline' : 'none';
}
function renderQuests() {
  const s = arpQuestState();
  const bar = arpExpBar();
  document.getElementById('exp-line').textContent =
    '玩家 Lv.' + bar.level + '｜EXP ' + bar.cur + '/' + bar.next;
  const list = document.getElementById('quest-list');
  list.innerHTML = '';
  ARP_QUESTS.forEach(q => {
    const prog = Math.min(q.target, s.prog[q.id] || 0);
    const claimed = s.claimed.includes(q.id);
    const done = prog >= q.target;
    const row = document.createElement('div');
    row.className = 'charrow' + (claimed ? ' locked' : '');
    row.innerHTML = '<div class="dot" style="background:#FFE06633">' + (claimed ? '✅' : done ? '🎁' : '⏳') + '</div>' +
      '<div class="info"><b>' + q.name + '</b>' +
      '<p>' + prog + '/' + q.target + '｜獎勵 ' + q.exp + ' EXP' + (q.item ? '＋配件' : '') + '</p></div>' +
      (done && !claimed ? '<button class="pill primary" data-claim="' + q.id + '">領取</button>' : '');
    list.appendChild(row);
  });
}
document.getElementById('btn-quests').addEventListener('click', () => {
  renderQuests();
  document.getElementById('modal-quests').style.display = 'flex';
  arpTrack('open_quests', {});
});
document.getElementById('quest-list').addEventListener('click', e => {
  const id = e.target.dataset.claim;
  if (!id) return;
  const q = questClaim(id);
  if (q) {
    arpSfx('found'); arpVibrate([40, 40, 80]);
    activeIds.forEach(cid => charReact(cid, 'celebrate'));
    showToast('🎉 任務完成！+' + q.exp + ' EXP' + (q.item ? '，獲得新配件！' : ''));
    if (q.item) CHARACTERS.forEach(applyAccessories);
    arpTrack('quest_claim', { quest: id });
    arpCloudLog('quest_claim', null, { quest: id });
    renderQuests(); updateQuestBadge();
  }
});
document.getElementById('btn-talk').addEventListener('click', () => talk());
document.getElementById('btn-feed').addEventListener('click', () => feed());

/* 📸 合照：相機畫面 + 3D 角色合成一張圖 */
function capturePhoto() {
  const video = document.querySelector('video');
  const glCanvas = sceneEl && sceneEl.canvas;
  if (!video || !glCanvas) return;
  const cw = glCanvas.width, chh = glCanvas.height;
  const cv = document.createElement('canvas'); cv.width = cw; cv.height = chh;
  const cx = cv.getContext('2d');
  const vw = video.videoWidth, vh = video.videoHeight;
  if (vw && vh) {
    const s = Math.max(cw / vw, chh / vh);
    cx.drawImage(video, (cw - vw * s) / 2, (chh - vh * s) / 2, vw * s, vh * s);
  }
  cx.drawImage(glCanvas, 0, 0, cw, chh);
  cx.fillStyle = 'rgba(255,255,255,.9)';
  cx.font = 'bold ' + Math.round(chh * 0.028) + 'px sans-serif';
  cx.textAlign = 'center';
  cx.shadowColor = 'rgba(0,0,0,.5)'; cx.shadowBlur = 6;
  cx.fillText((window.ARP_BRAND ? (ARP_BRAND.name || '') + '｜' : '') + 'ar-ip-pets.zeabur.app', cw / 2, chh - Math.round(chh * 0.03));
  const url = cv.toDataURL('image/jpeg', 0.9);
  document.getElementById('photo-img').src = url;
  document.getElementById('btn-photo-dl').href = url;
  document.getElementById('modal-photo').style.display = 'flex';
  arpSfx('found'); arpVibrate(60);
  questBump('photo'); updateQuestBadge();
  arpTrack('photo_capture', {}); arpCloudLog('photo_capture');
}
document.getElementById('btn-photo').addEventListener('click', capturePhoto);
document.getElementById('btn-photo-share').addEventListener('click', async () => {
  try {
    const blob = await (await fetch(document.getElementById('photo-img').src)).blob();
    const file = new File([blob], 'ar-pet.jpg', { type: 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: '我的 AR 夥伴', text: '掃產品就能喚醒角色！' });
      questBump('share'); updateQuestBadge();
      arpTrack('photo_share', {});
    } else {
      document.getElementById('btn-photo-dl').click();
    }
  } catch (e) {}
});

/* 手機音訊被擋時提示（只提示一次，任何觸碰後自動補播） */
let _blockedHintShown = false;
window.ARP_AUDIO_BLOCKED = function () {
  if (_blockedHintShown) return;
  _blockedHintShown = true;
  showToast('🔊 點一下畫面，角色就會開口說話');
};

/* 音效/語音開關 */
const btnSound = document.getElementById('btn-sound');
function renderSoundBtn() { btnSound.textContent = arpSoundOn() ? '🔊' : '🔇'; }
btnSound.addEventListener('click', () => {
  arpToggleSound(); renderSoundBtn();
  if (!arpSoundOn()) arpSpeakStop();
  arpTrack('toggle_sound', { on: arpSoundOn() });
});

/* 圖鑑 */
function updateBookBadge() {
  const visible = CHARACTERS.filter(c => !c.hideInBook).length;
  document.getElementById('book-count').textContent =
    arpCollectedCount() + '/' + visible;
}
const SPECIES_EMOJI = { bunny:'🐰', bear:'🐻', chick:'🐤', image:'🌟' };
function renderBook() {
  const s = arpLoad();
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  CHARACTERS.filter(c => !c.hideInBook).forEach(ch => {
    const owned = s.collected[ch.id];
    const row = document.createElement('div');
    row.className = 'charrow' + (owned ? '' : ' locked');
    const icon = (ch.species === 'image' && ch.imageSrc && owned)
      ? '<img src="' + ch.imageSrc + '" alt="">' : (owned ? SPECIES_EMOJI[ch.species] || '🌟' : '❓');
    row.innerHTML =
      '<div class="dot" style="background:' + (ch.colors ? ch.colors.body : '#eee') + '33">' + icon + '</div>' +
      '<div class="info"><b>' + (owned ? ch.name : '？？？') + '</b>' +
      '<p>' + (owned ? ch.intro : '掃描對應產品即可解鎖 — ' + ch.product) + '</p>' +
      (owned ? '<p class="lvl">💗 好感度 ' + owned.affection + '（Lv.' + arpLevel(owned.affection) + '）｜🍡 餵食 ' + owned.fed + ' 次</p>' : '') +
      '</div>';
    list.appendChild(row);
  });
  document.getElementById('btn-duo').style.display =
    arpCollectedCount() >= 2 ? 'block' : 'none';
  /* 配件背包（紙娃娃：穿上/脫下，同部位互斥） */
  const items = arpItems();
  const worn = arpWorn();
  const ICON = { hat: '🎩', glasses: '👓', scarf: '🧣', crown: '👑', bow: '🎀', backpack: '🎒' };
  const bag = document.createElement('div');
  bag.className = 'charrow';
  bag.style.flexDirection = 'column';
  bag.style.alignItems = 'stretch';
  bag.innerHTML = '<b style="color:var(--brand-dark);">🎒 配件背包 ' + items.length + '/' + ACCESSORIES.length + '</b>' +
    ACCESSORIES.map(a => {
      const owned = items.includes(a.id);
      const isWorn = worn.includes(a.id);
      return '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;' + (owned ? '' : 'opacity:.45;filter:grayscale(1);') + '">' +
        '<span style="font-size:22px;">' + (owned ? (ICON[a.id] || '🎁') : '🔒') + '</span>' +
        '<div style="flex:1;"><b style="font-size:14px;color:var(--brand-dark);">' + a.name + '</b>' +
        '<p style="font-size:11px;color:#888;">' + a.desc + '</p></div>' +
        (owned ? '<button class="pill' + (isWorn ? '' : ' primary') + '" style="min-height:36px;padding:6px 12px;font-size:13px;" data-wear="' + a.id + '">' +
          (isWorn ? '脫下' : '穿上') + '</button>' : '') +
        '</div>';
    }).join('');
  list.appendChild(bag);
}
document.getElementById('book-list').addEventListener('click', e => {
  const id = e.target.dataset.wear;
  if (!id) return;
  if (arpWorn().includes(id)) arpUnwear(id); else arpWear(id);
  arpSfx('pop');
  CHARACTERS.forEach(applyAccessories);
  renderBook();
  arpTrack('accessory_toggle', { item: id, worn: arpWorn().includes(id) });
});
document.getElementById('btn-book').addEventListener('click', () => {
  renderBook();
  document.getElementById('modal-book').style.display = 'flex';
  arpTrack('open_book', { collected: arpCollectedCount() });
});

/* 隱藏劇情 */
let duoToken = 0;
async function playDuo(idA, idB) {
  let script = idA && idB ? duoScriptFor(idA, idB) : null;
  if (!script) {
    const owned = Object.keys(arpLoad().collected);
    script = DUO_SCRIPTS.find(sc => sc.pair.every(p => owned.includes(p)));
  }
  if (!script) return;
  const token = ++duoToken;
  const box = document.getElementById('duo-lines');
  box.innerHTML = '';
  document.getElementById('modal-book').style.display = 'none';
  document.getElementById('modal-duo').style.display = 'flex';
  questBump('duo'); updateQuestBadge();
  arpTrack('duo_scene', { pair: script.pair.join('_') });
  arpCloudLog('duo_scene', null, { pair: script.pair.join('_') });
  /* 逐句接力：上一句「講完」才出下一句（關閉視窗即中止） */
  for (const [who, text] of script.lines) {
    if (token !== duoToken) return;
    if (document.getElementById('modal-duo').style.display !== 'flex') return;
    const c = charById(who);
    const d = document.createElement('div');
    d.className = 'duoline';
    d.innerHTML = '<b>' + c.name + '</b>' + text;
    box.appendChild(d);
    await arpSpeakSeq(c, text);
    await new Promise(r => setTimeout(r, 380));
  }
}
document.getElementById('btn-duo').addEventListener('click', () => playDuo());

document.querySelectorAll('[data-close]').forEach(b =>
  b.addEventListener('click', e => {
    const m = e.target.closest('.modal');
    m.style.display = 'none';
    if (m.id === 'modal-duo') { duoToken++; arpSpeakStop(); } // 關掉劇情就停止語音
  }));

/* ---- 啟動：載入設定 → 動態建 AR 場景（支援後台存的自訂 targets） ---- */
(async function init() {
  await arpLoadConfig();
  renderSoundBtn();
  updateBookBadge();
  updateQuestBadge();
  /* 每日簽到：今天第一次開 → +10 EXP */
  if (localStorage.getItem('arp_checkin') !== arpToday()) {
    localStorage.setItem('arp_checkin', arpToday());
    const r = arpAddExp(10);
    setTimeout(() => showToast('📅 每日簽到 +10 EXP！' + (r.levelUp ? ' 升到 Lv.' + r.level + '！' : '')), 1200);
    arpTrack('daily_checkin', { level: r.level });
    arpCloudLog('daily_checkin');
  }
  /* 品牌模式：標題換品牌名、站內連結帶 ?b= */
  if (window.ARP_BRAND) {
    document.querySelector('#topbar h1').textContent = '🌟 ' + (ARP_BRAND.name || ARP_BRAND.slug);
    ['lnk-map', 'lnk-scan', 'lnk-targets'].forEach(id => {
      const a = document.getElementById(id);
      a.href = arpLink(a.getAttribute('href'));
    });
  }
  if (arpIsCustomMode() && !window.ARP_BRAND) document.getElementById('custombar').style.display = 'block';
  document.getElementById('btn-clear-custom').addEventListener('click', () => {
    arpClearCustom(); location.reload();
  });

  sceneEl = document.createElement('a-scene');
  sceneEl.setAttribute('mindar-image',
    'imageTargetSrc: ' + arpTargetSrc() + '; maxTrack: 2; uiScanning: no; uiLoading: yes;');
  sceneEl.setAttribute('color-space', 'sRGB');
  sceneEl.setAttribute('renderer', 'colorManagement: true, physicallyCorrectLights: true, preserveDrawingBuffer: true');
  sceneEl.setAttribute('vr-mode-ui', 'enabled: false');
  sceneEl.setAttribute('device-orientation-permission-ui', 'enabled: false');

  const cam = document.createElement('a-camera');
  cam.setAttribute('position', '0 0 0');
  cam.setAttribute('look-controls', 'enabled: false');
  cam.setAttribute('cursor', 'fuse: false; rayOrigin: mouse');
  cam.setAttribute('raycaster', 'far: 10000; objects: .clickable');
  sceneEl.appendChild(cam);

  CHARACTERS.forEach(ch => {
    const anchor = document.createElement('a-entity');
    anchor.setAttribute('mindar-image-target', 'targetIndex: ' + ch.targetIndex);
    const charRoot = buildCharacter(ch);
    // 站在產品「旁邊」：偶數 target 站右、奇數站左（產品圖寬=1 單位，±0.55 剛好貼著圖緣）
    const side = ch.targetIndex % 2 === 0 ? 1 : -1;
    charRoot.setAttribute('scale', '1.1 1.1 1.1');
    charRoot.setAttribute('position', (0.55 * side) + ' -0.35 0');
    charRoot.setAttribute('rotation', '0 ' + (-15 * side) + ' 0');
    anchor.appendChild(charRoot);
    sceneEl.appendChild(anchor);
    anchor.addEventListener('targetFound', () => onFound(ch));
    anchor.addEventListener('targetLost', () => onLost(ch));
    charRoot.addEventListener('click', () => talk(ch));
    /* 待機隨機動作+眨眼：只在角色被鏡頭追蹤到時動（省電） */
    charAnimStart(ch, () => activeIds.includes(ch.id));
  });

  sceneEl.addEventListener('arReady', () => { setScanning(true); arpTrack('ar_ready', {}); });
  sceneEl.addEventListener('arError', () => {
    scanbox.style.display = 'none';
    hint.style.display = 'block';
    hint.innerHTML = '⚠️ 無法啟動相機。請確認：<br>1. 使用 https 網址開啟 2. 已允許相機權限<br>或改開 <a href="demo.html">無鏡頭展示模式</a>';
    arpTrack('ar_error', {});
  });
  document.body.appendChild(sceneEl);
  hint.style.display = 'block';

  /* 已解鎖配件掛上角色 */
  CHARACTERS.forEach(applyAccessories);

  /* 掃購買憑證/序號兌換配件：?gift=CODE（雛形，正式版走後端驗證防重複兌換） */
  const giftCode = new URLSearchParams(location.search).get('gift');
  if (giftCode) {
    const acc = ACCESSORIES.find(a => a.code && a.code.toUpperCase() === giftCode.toUpperCase());
    if (acc) {
      const isNew = arpUnlockItem(acc.id);
      setTimeout(() => showToast(isNew ? '🎁 獲得新配件：' + acc.name + '！' : 'ℹ️ 配件已擁有：' + acc.name), 800);
      CHARACTERS.forEach(applyAccessories);
      arpTrack('gift_redeem', { item: acc.id, is_new: isNew });
      arpCloudLog('gift_redeem', null, { item: acc.id });
    } else {
      setTimeout(() => showToast('❓ 序號無效'), 800);
    }
  }
})();
</script>
